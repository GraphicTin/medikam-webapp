<!DOCTYPE html>
<html>
<head>
    <title>ESP32-CAM Configurator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 16px; 
            background: var(--bg-color); 
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 480px;
        }
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid var(--border);
            margin-bottom: 16px; 
        }
        h2, h3 { margin-top: 0; margin-bottom: 16px; font-weight: 600; font-size: 18px; color: var(--text-main); }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }
        .field {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }
        .field.full {
            grid-column: span 2;
        }
        label { 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            color: var(--text-muted); 
            margin-bottom: 6px; 
        }
        input, textarea { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            background: var(--bg-color);
            border: 1px solid var(--border); 
            border-radius: 4px; 
            font-size: 14px; 
            color: var(--text-main);
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        textarea { resize: vertical; min-height: 60px; font-family: inherit; }
        button { 
            width: 100%; 
            padding: 12px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-weight: 600; 
            font-size: 14px; 
            cursor: pointer; 
            transition: background 0.15s ease;
        }
        button:hover { background: var(--accent-hover); }
        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .console-header h3 { margin: 0; }
        .btn-clear {
            width: auto;
            padding: 4px 10px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 12px;
        }
        .btn-clear:hover { background: rgba(255,255,255,0.05); border-color: var(--text-muted); }
        .console-box { 
            background: #020617; 
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; 
            padding: 12px; 
            border-radius: 4px; 
            height: 200px; 
            overflow-y: auto; 
            font-size: 12px; 
            border: 1px solid var(--border);
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>System Provisioning</h2>
        
        <div class="grid">
            <div class="field">
                <label>Wi-Fi SSID</label>
                <input type="text" id="ssid" placeholder="Network Name">
            </div>
            
            <div class="field">
                <label>Wi-Fi Password</label>
                <input type="password" id="password" placeholder="Credentials">
            </div>
        </div>

        <div class="field">
            <label>LINE Token</label>
            <input type="password" id="token" placeholder="Bearer Token">
        </div>

        <div class="field">
            <label>LINE Target User ID</label>
            <input type="text" id="user_id" placeholder="Uxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
        </div>

        <div class="field">
            <label>Alert Message</label>
            <textarea id="message" placeholder="Payload text to dispatch..."></textarea>
        </div>
        
        <button onclick="sendCredentials()">Transmit System Payload</button>
    </div>

    <div class="card">
        <div class="console-header">
            <h3>Diagnostic Interface</h3>
            <button class="btn-clear" onclick="clearLog()">Clear</button>
        </div>
        <div class="console-box" id="consoleLog"></div>
    </div>
</div>

<script>
const SERVICE_UUID = "4faac861-11a1-11ee-be56-0242ac120002";
const CHARACTERISTIC_UUID = "4faac862-11a1-11ee-be56-0242ac120002";

function log(message, type = 'info') {
    const consoleBox = document.getElementById('consoleLog');
    const timestamp = new Date().toLocaleTimeString();
    let color = '#38bdf8'; // Info/Link color
    if (type === 'error') color = '#f87171';
    if (type === 'warn') color = '#fbbf24';
    
    consoleBox.innerHTML += `<span style="color: ${color}">[${timestamp}] ${message}</span><br/>`;
    consoleBox.scrollTop = consoleBox.scrollHeight;
    console.log(`[BLE] ${message}`);
}

function clearLog() {
    document.getElementById('consoleLog').innerHTML = '';
}

async function sendCredentials() {
    const ssid = document.getElementById('ssid').value;
    const pass = document.getElementById('password').value;
    const token = document.getElementById('token').value;
    const userId = document.getElementById('user_id').value;
    const msg = document.getElementById('message').value;
    
    if(!ssid || !pass || !token || !userId || !msg) { 
        log('Aborted: All dataset vectors must be filled.', 'warn');
        return; 
    }
    
    log('Scanning for ESP32-CAM advertising interval...');
    try {
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ services: [SERVICE_UUID] }]
        });
        
        log(`Target matched: ${device.id}. Handshaking...`);
        
        device.addEventListener('gattserverdisconnected', () => {
            log('Link terminated by hardware window boundary.', 'error');
        });

        const server = await device.gatt.connect();
        log('GATT peripheral connected. Querying configuration descriptors...');
        
        const service = await server.getPrimaryService(SERVICE_UUID);
        const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
        
        // CSV encoding sequence matching the hardware delimiter parser logic
        const rawString = `${ssid},${pass},${token},${userId},${msg}`;
        const encoder = new TextEncoder();
        const payload = encoder.encode(rawString);
        
        log(`Streaming raw string data array payload (${payload.length} bytes)...`);
        await characteristic.writeValue(payload);
        
        log('Transmission successfully acknowledged by host NVRAM!', 'info');
        await device.gatt.disconnect();
        log('Session closed cleanly.');
        
    } catch (error) {
        log(`Runtime Exception: ${error.message}`, 'error');
    }
}
    
log('Diagnostic pipeline active. Core operational.');
</script>
</body>
</html>
