<!DOCTYPE html>
<html>
<head>
    <title>ESP32-CAM Control Terminal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg: #0b0f19;
            --panel: #131c2e;
            --border: #22314d;
            --text: #e2e8f0;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-success: #16a34a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 8px;
        }
        
        /* Master Console Layout */
        .workspace {
            display: flex;
            flex: 1;
            gap: 8px;
            min-height: 0;
        }
        
        /* Left Controller Column */
        .control-panel {
            width: 400px;
            background: var(--panel);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 16px;
        }
        
        /* Right Monitor Column */
        .monitor-panel {
            flex: 1;
            background: #05070f;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        h2 { font-size: 14px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        
        label { font-size: 11px; color: var(--text-muted); font-weight: bold; }
        input, textarea {
            background: #070a12;
            border: 1px solid var(--border);
            color: #4ade80;
            padding: 8px;
            font-family: inherit;
            font-size: 13px;
            border-radius: 2px;
            width: 100%;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); }
        textarea { resize: none; flex: 1; min-height: 80px; }

        button {
            background: var(--accent);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px;
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.1s;
        }
        button:hover { background: #1d4ed8; }
        
        /* Console Logs Window */
        .terminal-header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .terminal-log {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
        }
        .clear-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 2px 8px; font-size: 11px; }
        .clear-btn:hover { border-color: var(--text); color: var(--text); }
    </style>
</head>
<body>

<div class="workspace">
    <div class="control-panel">
        <h2>System Parameters Matrix</h2>
        
        <div class="form-row">
            <div class="form-group">
                <label>[NET_SSID]</label>
                <input type="text" id="ssid" autocomplete="off">
            </div>
            <div class="form-group">
                <label>[NET_PASS]</label>
                <input type="password" id="password">
            </div>
        </div>

        <div class="form-group">
            <label>[LINE_API_BEARER_TOKEN]</label>
            <input type="password" id="token">
        </div>

        <div class="form-group">
            <label>[LINE_TARGET_UUID]</label>
            <input type="text" id="user_id" autocomplete="off">
        </div>

        <div class="form-group" style="flex: 1;">
            <label>[RAW_DATA_MESSAGE_STRING]</label>
            <textarea id="message"></textarea>
        </div>
        
        <button onclick="sendCredentials()">Execute Transmission Pipeline</button>
    </div>

    <div class="monitor-panel">
        <div class="terminal-header">
            <h2>Live Output Monitor</h2>
            <button class="clear-btn" onclick="clearLog()">Clear Buffer</button>
        </div>
        <div class="terminal-log" id="consoleLog"></div>
    </div>
</div>

<script>
const SERVICE_UUID = "4faac861-11a1-11ee-be56-0242ac120002";
const CHARACTERISTIC_UUID = "4faac862-11a1-11ee-be56-0242ac120002";

function log(message, type = 'info') {
    const consoleBox = document.getElementById('consoleLog');
    const timestamp = new Date().toLocaleTimeString();
    let prefix = '>> ';
    let color = '#e2e8f0';
    
    if (type === 'error') { color = '#f87171'; prefix = '[ERR] '; }
    if (type === 'warn') { color = '#fbbf24'; prefix = '[WRN] '; }
    if (type === 'success') { color = '#4ade80'; prefix = '[OK ] '; }
    
    consoleBox.innerHTML += `<span style="color: ${color}">${timestamp} ${prefix}${message}</span><br/>`;
    consoleBox.scrollTop = consoleBox.scrollHeight;
}

function clearLog() {
    document.getElementById('consoleLog').innerHTML = '';
}

async function sendCredentials() {
    const ssid = document.getElementById('ssid').value;
    const pass = document.getElementById('password').value;
    const token = document.getElementById('token').value;
    const userId = document.getElementById('user_id').value;
    const msg = document.getElementById('message').value;
    
    if(!ssid || !pass || !token || !userId || !msg) { 
        log('Data packet injection aborted: Missing parameters within dataset fields.', 'warn');
        return; 
    }
    
    log('Scanning host wireless adapters for advertising target UUID...');
    try {
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ services: [SERVICE_UUID] }]
        });
        
        log(`Target verification matched: ID: ${device.id}. Initializing session handshake.`);
        
        device.addEventListener('gattserverdisconnected', () => {
            log('Hardware loop sequence termination: Link dropped.', 'error');
        });

        const server = await device.gatt.connect();
        log('GATT interface linked. Polling peripheral descriptors...');
        
        const service = await server.getPrimaryService(SERVICE_UUID);
        const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
        
        const rawString = `${ssid},${pass},${token},${userId},${msg}`;
        const encoder = new TextEncoder();
        const payload = encoder.encode(rawString);
        
        log(`Streaming dataset array to target characteristic register (${payload.length} bytes)...`);
        await characteristic.writeValue(payload);
        
        log('Data transmission complete. Payload verified.', 'success');
        await device.gatt.disconnect();
        log('Session terminated cleanly. Device returned to operational state.');
        
    } catch (error) {
        log(`Pipeline exception error: ${error.message}`, 'error');
    }
}
    
log('Terminal sequence active. Monitoring pipeline ready.');
</script>
</body>
</html>
