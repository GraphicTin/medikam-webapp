<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Control Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="status-bar">
            <span id="statusText">Disconnected</span>
            <button id="connectBtn" class="action-btn connect">Connect Device</button>
            <button id="disconnectBtn" class="action-btn disconnect" style="display:none;">Disconnect</button>
        </div>

        <div class="panel-card">
            <h2>Instant Line Notifications</h2>
            <div class="trigger-grid">
                <button class="trigger-btn" data-trigger="1">Execute Trigger 1</button>
                <button class="trigger-btn" data-trigger="2">Execute Trigger 2</button>
                <button class="trigger-btn" data-trigger="3">Execute Trigger 3</button>
            </div>
        </div>

        <div class="panel-card">
            <h2>Device Configuration</h2>
            <p class="section-desc">Modify only the parameters you want to update. Empty fields will not be sent.</p>
            
            <div class="field-group">
                <label>Network Settings</label>
                <input type="text" id="cfg_SSID" placeholder="WiFi SSID (SSID)">
                <input type="password" id="cfg_PASSWORD" placeholder="WiFi Password (PASSWORD)">
            </div>

            <div class="field-group">
                <label>Line Messaging Credentials</label>
                <input type="text" id="cfg_TOKEN" placeholder="Line Token (TOKEN)">
                <input type="text" id="cfg_USER_ID" placeholder="Line User ID (USER_ID)">
                <input type="text" id="cfg_MESSAGE" placeholder="Notification Message (MESSAGE)">
            </div>

            <div class="field-group">
                <label>System Properties</label>
                <input type="text" id="cfg_BLUETOOTH" placeholder="Bluetooth Name (BLUETOOTH)">
            </div>

            <div class="field-group">
                <label>Scheduled Trigger Times (HH:MM)</label>
                <div class="time-row"><span>Slot 1:</span><input type="time" id="cfg_TIME_1"></div>
                <div class="time-row"><span>Slot 2:</span><input type="time" id="cfg_TIME_2"></div>
                <div class="time-row"><span>Slot 3:</span><input type="time" id="cfg_TIME_3"></div>
            </div>

            <button id="syncBtn" class="submit-btn" disabled>Sync Modifications</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
