<!DOCTYPE html>
<html>
<head>
    <title>ESP32 Control Terminal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="workspace">
    <div class="pipeline-lock-overlay" id="pipelineLock">
        <div class="spinner-box">PROCEEDING WIRELESS HANDSHAKE...</div>
    </div>

    <div class="control-panel" id="inputContainer">
        <h2>System Parameters Matrix</h2>
        
        <div class="form-row">
            <div class="form-group">
                <label>[SSID]</label>
                <input type="text" id="ssid" autocomplete="off">
            </div>
            <div class="form-group">
                <label>[PASSWORD]</label>
                <input type="password" id="password">
            </div>
        </div>

        <div class="form-group">
            <label>[TOKEN]</label>
            <input type="password" id="token">
        </div>

        <div class="form-group">
            <label>[USER_ID]</label>
            <input type="text" id="user_id" autocomplete="off">
        </div>

        <div class="form-group">
            <label>[BLUETOOTH]</label>
            <input type="text" id="ble_name" autocomplete="off">
        </div>

        <div class="form-group">
            <label>[TRIGGER TIMES]</label>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
                <input type="time" id="time_1" step="60">
                <input type="time" id="time_2" step="60">
                <input type="time" id="time_3" step="60">
            </div>
        </div>

        <div class="form-group">
            <label>[MESSAGE]</label>
            <textarea id="message"></textarea>
        </div>
        
        <div class="button-group">
            <button class="btn-primary" id="btnTx" onclick="sendActiveConfig()">Transmit Config</button>
            <button class="btn-alt" id="btnTest" onclick="triggerHardwareLineNotify()">Hardware Test</button>
        </div>
    </div>

    <div class="monitor-panel">
        <div class="terminal-header">
            <h2>Live Output Monitor</h2>
            <button class="clear-btn" onclick="clearLog()">Clear Buffer</button>
        </div>
        <div class="terminal-log" id="consoleLog"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
