<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 BLE Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="panel">
        <section class="section">
            <h2>Connection</h2>
            <button id="connectBtn" class="action-btn">Connect Device</button>
            <button id="disconnectBtn" class="action-btn cancel-btn" style="display:none;">Disconnect</button>
            <p id="statusText" class="status-info">Disconnected</p>
        </section>

        <section class="section">
            <h2>Line Notification Triggers</h2>
            <div class="trigger-grid">
                <button class="trigger-btn" onclick="sendTriggerValue('1')">Trigger 1</button>
                <button class="trigger-btn" onclick="sendTriggerValue('2')">Trigger 2</button>
                <button class="trigger-btn" onclick="sendTriggerValue('3')">Trigger 3</button>
            </div>
        </section>

        <section class="section">
            <h2>System Parameters</h2>
            <div class="field"><label>WiFi Network Name</label><input type="text" id="ssid"></div>
            <div class="field"><label>WiFi Password</label><input type="password" id="password"></div>
            <div class="field"><label>Line Token</label><input type="text" id="token"></div>
            <div class="field"><label>Line User ID</label><input type="text" id="userId"></div>
            <div class="field"><label>Line Message</label><input type="text" id="message"></div>
            <div class="field"><label>Bluetooth Identifier</label><input type="text" id="btName"></div>
            <button id="sendConfigBtn" class="action-btn" style="margin-top: 15px;" disabled>Save Settings</button>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
