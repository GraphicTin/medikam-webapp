<!DOCTYPE html>
<html>
<head>
    <title>ESP32-CAM Configurator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f4f4f9; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto 20px auto; }
        .battery-box { display: flex; align-items: center; justify-content: space-between; background: #e9e9eb; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        .battery-level { color: #34c759; }
        button { width: 100%; padding: 12px; background: #007aff; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-warn { background: #ff9500; }
    </style>
</head>
<body>

<div class="card">
    <div class="battery-box">
        <span>Estimated Battery Status:</span>
        <span class="battery-level" id="bat-val">100% (USB Powered)</span>
    </div>
    
    <h2>ESP32-CAM Control</h2>
    <button onclick="triggerLightSleep()" class="btn-warn">Enter Light Sleep Mode</button>
</div>

<script>
const SERVICE_UUID = "4faac861-11a1-11ee-be56-0242ac120002";
const CHARACTERISTIC_UUID = "4faac862-11a1-11ee-be56-0242ac120002";

async function sendCommand(payloadString) {
    const device = await navigator.bluetooth.requestDevice({
        filters: [{ services: [SERVICE_UUID] }]
    });
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
    
    const encoder = new TextEncoder();
    await characteristic.writeValue(encoder.encode(payloadString));
    await device.gatt.disconnect();
}

async function triggerLightSleep() {
    try {
        await sendCommand("LIGHTSLEEP");
        alert('Light Sleep command sent! Device will wake up automatically in 30 seconds.');
    } catch (error) {
        alert('Error: ' + error);
    }
}
</script>
</body>
</html>
