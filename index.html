<!DOCTYPE html>
<html>
<head>
    <title>ESP32-CAM Configurator (Dev Mode)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f4f4f9; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto 20px auto; }
        input { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #007aff; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .console-box { background: #1e1e1e; color: #00ff00; font-family: monospace; padding: 15px; border-radius: 8px; height: 180px; overflow-y: auto; font-size: 12px; margin-top: 10px; box-shadow: inset 0 0 10px #000; }
        .dev-badge { background: #ff9500; color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; float: right; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <span class="dev-badge">DEV MODE</span>
    <h2>ESP32-CAM Wi-Fi Setup</h2>
    <label>Wi-Fi SSID</label>
    <input type="text" id="ssid" placeholder="e.g. MyHomeNetwork">
    
    <label>Wi-Fi Password</label>
    <input type="password" id="password" placeholder="e.g. SecretPass123">
    
    <button onclick="sendCredentials()">Connect & Save to SD</button>
</div>

<div class="card">
    <h3>Live Web BLE Terminal</h3>
    <button onclick="clearLog()" style="background:#555; padding: 6px; font-size: 12px; width: auto; float: right; margin-top:-35px;">Clear</button>
    <div class="console-box" id="consoleLog"></div>
</div>

<script>
const SERVICE_UUID = "4faac861-11a1-11ee-be56-0242ac120002";
const CHARACTERISTIC_UUID = "4faac862-11a1-11ee-be56-0242ac120002";

function log(message, type = 'info') {
    const consoleBox = document.getElementById('consoleLog');
    const timestamp = new Date().toLocaleTimeString();
    let color = '#00ff00';
    if (type === 'error') color = '#ff3b30';
    if (type === 'warn') color = '#ff9500';
    
    consoleBox.innerHTML += `<span style="color: ${color}">[${timestamp}] ${message}</span><br/>`;
    consoleBox.scrollTop = consoleBox.scrollHeight;
    console.log(`[BLE DEV] ${message}`);
}

function clearLog() {
    document.getElementById('consoleLog').innerHTML = '';
}

async function sendCredentials() {
    const ssid = document.getElementById('ssid').value;
    const pass = document.getElementById('password').value;
    
    if(!ssid || !pass) { 
        log('Error: Empty credentials rejected.', 'warn');
        return; 
    }
    
    log('Scanning for ESP32-CAM (Polling window active)...');
    try {
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ services: [SERVICE_UUID] }]
        });
        
        log(`Found device: ${device.name || device.id}. Connecting...`);
        
        // Listen for sudden disconnections (e.g., if ESP32 deep sleep window times out)
        device.addEventListener('gattserverdisconnected', () => {
            log('Target device disconnected unexpectedly.', 'error');
        });

        const server = await device.gatt.connect();
        log('GATT Server connected. Locating services...');
        
        const service = await server.getPrimaryService(SERVICE_UUID);
        const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
        log('Characteristic verified. Encoding payload...');
        
        const encoder = new TextEncoder();
        const payload = encoder.encode(`${ssid},${pass}`);
        
        log(`Transmitting raw binary: ${payload.length} bytes...`);
        await characteristic.writeValue(payload);
        
        log('Payload acknowledged by ESP32 successfully!', 'info');
        await device.gatt.disconnect();
        log('Disconnected cleanly.');
        
    } catch (error) {
        log(`BLE Exception: ${error.message}`, 'error');
    }
}

// Initial system print
log('Web Terminal initialized. Ready to interface.');
</script>
</body>
</html>
